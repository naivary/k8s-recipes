apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-domain-tls
  namespace: kube-system
spec:
  duration: 1128h
  renewBefore: 240h
  secretName: wildcard-domain-tls
  dnsNames:
    - "*.mh.internal"
  issuerRef:
    name: self-signed
    kind: ClusterIssuer
    group: cert-manager.io
