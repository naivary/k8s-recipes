nonIdempotentAnnotations:
  argocd.argoproj.io/compare-options: IgnoreExtraneous
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: true # Beta feature in 1.18.5. Turn off if any problems occur
kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445
routingMode: native
ipv4NativeRoutingCIDR: ${CLUSTER_IP_RANGE}
ipam:
  mode: kubernetes
gatewayAPI:
  enabled: true
  enableAlpn: true
  enableAppProtocol: true
cgroup:
  hostRoot: /sys/fs/cgroup
  autoMount:
    enabled: false
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
